<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Ninja Unkende 4 | 2nd Channel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg"></div>
    <div id="nav"></div>

    <script src="script.js"></script>
    <script>
        fetch("nav.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("nav").innerHTML = html;
                if (typeof initMenu === "function") initMenu();
                if (typeof setActiveLink === "function") setActiveLink();
                if (typeof updateMenuTitle === "function") updateMenuTitle();
            });
    </script>

    <div class="container card">
        <h1>Team Ninja Unkende 4 (TNU4)</h1>
        <p>Фан-игра, посвящённая Ninja Gaiden 4, с уникальными уровнями и персонажами.</p>
    </div>

</body>
</html>
