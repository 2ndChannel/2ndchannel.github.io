<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../a_data/system/style.css">
	<link rel="stylesheet" href="../a_data/system/components.css">
	<link rel="canonical" href="https://2ndchannel.github.io/games/">
	<link rel="icon" href="/favicon.ico" type="image/x-icon">
	<title>Игры на стримах | 2nd Channel</title>
	<meta name="robots" content="index, follow">
</head>
<body>

<div class="bg"></div>
<div id="nav"></div>

<div class="container">
    <div class="filters-container">
        <button class="filters-toggle" onclick="document.getElementById('f-panel').classList.toggle('open')">⚙ Настройки поиска</button>
        <div class="filters-panel" id="f-panel">
            <div class="filter-group"><label>Платформа</label>
                <div class="checkbox-group" id="f-plat">
                    <label><input type="checkbox" value="all" checked> Все</label>
                    <label><input type="checkbox" value="NES"> NES</label>
                    <label><input type="checkbox" value="SMD"> SMD</label>
                    <label><input type="checkbox" value="SMS"> SMS</label>
                    <label><input type="checkbox" value="PC"> PC</label>
                </div>
            </div>
            <div class="filter-group"><label>Статус</label>
                <div class="checkbox-group" id="f-status">
                    <label><input type="checkbox" value="all" checked> Все</label>
                    <label><input type="checkbox" value="red"> Red</label>
                    <label><input type="checkbox" value="yellow"> Yellow</label>
                    <label><input type="checkbox" value="green"> Green</label>
                </div>
            </div>
            <div style="display:flex; gap:10px; justify-content:center;">
                <div class="filter-group"><label>С даты</label><input type="date" id="f-date-start"></div>
                <div class="filter-group"><label>По дату</label><input type="date" id="f-date-end"></div>
            </div>
            <button id="resetFilters" style="margin-top:10px; background:#c0392b; color:#fff;">Сбросить всё</button>
        </div>
    </div>
    <div id="games"></div>
</div>

<script src="../a_data/system/script.js"></script>
<script>
    loadNavbar();
    initGamesPage();
</script>
</body>
</html>
