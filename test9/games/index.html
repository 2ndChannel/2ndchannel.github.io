<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../a_data/system/style.css">
	<link rel="stylesheet" href="../a_data/system/components.css">
	<link rel="canonical" href="https://2ndchannel.github.io/games/">
	<link rel="icon" href="/favicon.ico" type="image/x-icon">
	<title>Игры на стримах | 2nd Channel</title>
	<meta name="robots" content="index, follow">
</head>
<body>

<div class="bg"></div>
<div id="nav"></div>

<div class="container">
	<div class="filters-panel">
		<div class="filter-group"><label>Платформа</label>
			<select id="f-plat">
				<option value="all">Все</option>
				<option value="NES">NES</option><option value="SMD">SMD</option>
				<option value="SMS">SMS</option><option value="PC">PC</option>
			</select>
		</div>
		<div class="filter-group"><label>Статус</label>
			<select id="f-status">
				<option value="all">Все</option>
				<option value="red">Красный</option>
				<option value="yellow">Желтый</option>
				<option value="green">Зеленый</option>
			</select>
		</div>
		<div class="filter-group"><label>С даты</label><input type="date" id="f-date-start"></div>
		<div class="filter-group"><label>По дату</label><input type="date" id="f-date-end"></div>
		<div class="filter-group"><label>Сортировка</label>
			<select id="f-sort">
				<option value="date-desc">Новые сверху</option>
				<option value="date-asc">Старые сверху</option>
				<option value="name-asc">А-Я (Имя)</option>
			</select>
		</div>
		<button id="resetFilters">Сброс</button>
	</div>

	<div id="games"></div>
</div>

<script src="../a_data/system/script.js"></script>
<script>
    loadNavbar();
    initGamesPage();
</script>
</body>
</html>
