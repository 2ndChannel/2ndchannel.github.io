<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ресурсы 2nd Channel</title>
  <meta name="description" content="2nd Channel — площадка, посвящённая ретро играм NES/Dendy, Sega, фан-проекту TNU4 и стримам.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="components.css">
</head>
<body>

<div class="bg"></div>
<div id="nav"></div>

<div class="container">

  <div id="news-block" class="alert-box">
    <span id="news-text"></span>
    <div id="countdown" class="timer"></div>
    <button id="close-news" class="alert-close">✖</button>
  </div>

  <div class="card">
    <h1>2nd Channel</h1>
    <p>
      2nd Channel — это площадка, посвящённая ретро играм NES / Dendy и Sega,
      фан-игре Team Ninja Unkende 4 (TNU4), совместным кинопросмотрам
      и ретро-культуре.
    </p>
  </div>

	<div class="card links">
		<h1>YouTube</h1>
		<a href="https://www.youtube.com/@2ndChannelGO" target="_blank" rel="noopener noreferrer">
		  <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">Основной канал
		</a>
		<a href="https://www.youtube.com/@2ndChannel-Pirate" target="_blank" rel="noopener noreferrer">
		  <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">Пиратский канал
		</a>
		<a href="https://www.youtube.com/@2ndChannel-Archive" target="_blank" rel="noopener noreferrer">
		  <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">Архивный канал
		</a>
	</div>

  <div class="card links">
    <h1>Стриминг</h1>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/145/145813.png">VK Live</a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968819.png">Trovo</a>
  </div>

  <div class="card links">
    <h1>Соцсети</h1>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/145/145813.png">Группа VK</a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/747/747376.png">Форум проекта</a>
  </div>

</div>

<script src="script.js"></script>
<script>
  // Загрузка навигации
  loadNavbar();

  // Логика новостей
  const newsBlock = document.getElementById("news-block");
  const newsText = document.getElementById("news-text");
  const countdownEl = document.getElementById("countdown");
  const closeBtn = document.getElementById("close-news");

  function parseLinks(text) {
    return text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  }

  function startCountdown(eventDate, finishedText) {
    function updateTimer() {
      const now = new Date();
      let diff = Math.floor((eventDate - now) / 1000);
      if (diff > 0) {
        const h = Math.floor(diff / 3600);
        const m = Math.floor((diff % 3600) / 60);
        const s = diff % 60;
        countdownEl.textContent = `До начала: ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      } else {
        countdownEl.textContent = finishedText || "Событие началось!";
        clearInterval(timerInterval);
      }
    }
    updateTimer();
    const timerInterval = setInterval(updateTimer, 1000);
  }

  function isVisible(news, now) {
    let start = news.startDate ? new Date(news.startDate) : null;
    let end = news.endDate ? new Date(news.endDate) : null;
    return (!start || now >= start) && (!end || now <= end);
  }

  fetch("news.json")
    .then(r => r.json())
    .then(newsArray => {
      const now = new Date();
      let activeNews = newsArray.find(n => n.id !== "always" && isVisible(n, now) && !localStorage.getItem("newsClosed_" + n.id));

      if (!activeNews) {
        activeNews = newsArray.find(n => n.id === "always" && !localStorage.getItem("newsClosed_always"));
      }

      if (activeNews) {
        let text = activeNews.text;
        
        if (activeNews.eventTime) {
          const [hours, minutes] = activeNews.eventTime.split(":").map(Number);
          const eventDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes);
          text = text.replace("{eventTime}", activeNews.eventTime);
          
          if (now < eventDate) {
            startCountdown(eventDate, activeNews.startedText);
          } else {
            countdownEl.textContent = activeNews.startedText || "Уже в эфире / Началось!";
          }
        } else {
          countdownEl.style.display = "none";
        }

        newsText.innerHTML = parseLinks(text);
        newsBlock.style.display = "block";
        closeBtn.onclick = () => {
          newsBlock.style.display = "none";
          localStorage.setItem("newsClosed_" + activeNews.id, "true");
        };
      }
    });
</script>

</body>
</html>
