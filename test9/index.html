<body>

<div class="bg"></div>
<div id="nav"></div>
<script src="script.js"></script>
<script>loadNavbar();</script>

<div class="container">

  <!-- NEWS -->
  <div id="stream-news" style="display:none; background:#ffcc00; padding:12px; text-align:center; font-weight:bold; border-radius:8px; margin-bottom:15px; position:relative;">
    <span id="news-text"></span>
    <div id="countdown" style="margin-top:5px; font-weight:normal;"></div>
    <button id="close-news" style="position:absolute; right:10px; top:8px; background:none; border:none; font-weight:bold; cursor:pointer;">✖</button>
  </div>

  <!-- INTRO SEO TEXT -->
  <div class="card">
    <h1>2nd Channel</h1>
    <p>
      2nd Channel — это площадка, посвящённая ретро играм NES / Dendy и Sega (и не только),
      фан-игре Team Ninja Unkende 4 / Ninja Gaiden 4 (TNU4), совместным кинопросмотрам
      и связанным темам.
    </p>
  </div>

  <!-- LINKS -->
  <div class="card links">
    <h2>YouTube2</h2>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">Канал 1</a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">Канал 2</a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">Канал 3</a>
  </div>

  <div class="card links">
    <h2>Стриминг</h2>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/145/145813.png">VK Live</a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968819.png">Trovo</a>
  </div>

  <div class="card links">
    <h2>Соцсети</h2>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/145/145813.png">VK паблик</a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/747/747376.png">Форум</a>
  </div>

</div>

<script>
const newsBlock = document.getElementById("stream-news");
const newsText = document.getElementById("news-text");
const countdownEl = document.getElementById("countdown");
const closeBtn = document.getElementById("close-news");

// Markdown-ссылки [text](url) → HTML
function parseLinks(text) {
  return text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
}

// Таймер обратного отсчёта
function startCountdown(eventDate, finishedText) {
  function updateTimer() {
    const now = new Date();
    let diff = Math.floor((eventDate - now) / 1000);
    if (diff > 0) {
      const h = Math.floor(diff / 3600);
      diff %= 3600;
      const m = Math.floor(diff / 60);
      const s = diff % 60;
      countdownEl.textContent = `До события: ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    } else {
      countdownEl.textContent = finishedText || "Событие уже началось!";
      clearInterval(timerInterval);
    }
  }
  updateTimer();
  const timerInterval = setInterval(updateTimer, 1000);
}

// Проверка активности новости по дате с учётом локальной даты
function isNewsActive(news, now) {
  let start = news.startDate ? new Date(news.startDate) : null;
  let end = news.endDate ? new Date(news.endDate) : null;

  if (start) start = new Date(start.getFullYear(), start.getMonth(), start.getDate(), start.getHours(), start.getMinutes(), start.getSeconds());
  if (end) end = new Date(end.getFullYear(), end.getMonth(), end.getDate(), end.getHours(), end.getMinutes(), end.getSeconds());

  return (!start || now >= start) && (!end || now <= end);
}

// Загрузка новостей
fetch("news.json")
  .then(r => r.json())
  .then(newsArray => {
    const now = new Date();
    let shown = false;

    for (const news of newsArray) {
      if (!isNewsActive(news, now)) continue;

      const closed = localStorage.getItem("newsClosed_" + news.id);
      if (closed) continue;

      let text = news.text;
      let finishedText = news.startedText || "Событие уже началось!";

      if (news.eventTime) {
        const [hours, minutes] = news.eventTime.split(":").map(Number);
        // Создаём дату события в локальной временной зоне
        const eventDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes);

        text = text.replace("{eventTime}", news.eventTime);

        if (now < eventDate) {
          startCountdown(eventDate, finishedText);
        } else {
          countdownEl.textContent = finishedText;
        }
      } else {
        countdownEl.textContent = "";
      }

      newsText.innerHTML = parseLinks(text);
      newsBlock.style.display = "block";
      closeBtn.dataset.newsId = news.id;
      shown = true;
      break;
    }

    // Если ни одна новость не подошла, показать always
    if (!shown) {
      for (const news of newsArray) {
        if (news.id === "always") {
          const closed = localStorage.getItem("newsClosed_" + news.id);
          if (!closed) {
            newsText.innerHTML = parseLinks(news.text);
            countdownEl.textContent = "";
            newsBlock.style.display = "block";
            closeBtn.dataset.newsId = news.id;
          }
          break;
        }
      }
    }
  });

closeBtn.onclick = function() {
  const newsId = this.dataset.newsId || "default";
  newsBlock.style.display = "none";
  localStorage.setItem("newsClosed_" + newsId, "true");
};
</script>

</body>
</html>
