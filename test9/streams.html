<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список эфиров | 2nd Channel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg"></div>
    <div id="nav"></div>

    <script src="script.js"></script>

    <script>
        fetch("nav.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("nav").innerHTML = html;
                if (typeof initMenu === "function") initMenu();
                if (typeof setActiveLink === "function") setActiveLink();
                if (typeof updateMenuTitle === "function") updateMenuTitle();
            });
    </script>

    <div class="container card">
        <h2>Список эфиров</h2>
        <ul>
            <li><a href="#">NES Stream #1 — Архив игр и видео</a></li>
            <li><a href="#">NES Stream #2 — Новые прохождения</a></li>
        </ul>
    </div>

</body>
</html>
