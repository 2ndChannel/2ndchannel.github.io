<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<title>Игры на стримах | 2nd Channel</title>

<meta name="description" content="Список игр со стримов 2nd Channel: NES, Dendy, Sega, фан-игры, ссылки на прохождения и загрузку игр.">
<meta name="keywords" content="игры на стриме, NES игры, Dendy игры, Sega, скачать игры, ретро игры, фан игры, TNU4, 2nd Channel">
</head>

<body>

<div class="bg"></div>

<div id="nav"></div>
<script>
fetch("nav.html")
.then(r => r.text())
.then(html => {
  document.getElementById("nav").innerHTML = html;

  initMenu();
  setActiveLink();
  updateMenuTitle();
});
</script>

<div class="container card center">

  <div style="margin-bottom:10px;">
    <label>Сортировка: </label>
    <select id="sortSelect">
      <option value="date" selected>По дате (новые)</option>
      <option value="name">По алфавиту</option>
      <option value="status">По статусу</option>
    </select>
  </div>

  <!-- Кнопка для скачивания выбранных файлов -->
  <button id="downloadSelected" style="margin-bottom:10px;">Скачать выбранное</button>

  <div id="games"></div>

</div>

<!-- Подключаем JSZip и FileSaver для создания ZIP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.11.0/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>
let gamesData = [];
const ytCache = {};

// Получение названия видео YouTube
function getYouTubeTitle(url){
  if(!url) return Promise.resolve("");
  if(ytCache[url]) return Promise.resolve(ytCache[url]);

  if(!url.includes("youtube.com") && !url.includes("youtu.be")){
    return Promise.resolve("");
  }

  const api = "https://www.youtube.com/oembed?url=" + encodeURIComponent(url) + "&format=json";

  return fetch(api)
    .then(r => r.json())
    .then(d => {
      ytCache[url] = d.title;
      return d.title;
    })
    .catch(() => "");
}

// Рендер списка игр с чекбоксами
function renderGames(data){
  const container = document.getElementById("games");
  container.innerHTML = "";

  data.forEach(async (g, i) => {
    const title = await getYouTubeTitle(g.stream);

    const div = document.createElement("div");
    div.className = `badge ${g.status}`;

    div.innerHTML = `
      <input type="checkbox" class="game-checkbox" data-index="${i}">
      
      <a href="${g.stream}" target="_blank" title="${title}">
        <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png" width="18">
      </a>

      <a href="${g.download}" target="_blank" download>
        <img src="https://cdn-icons-png.flaticon.com/512/724/724933.png" width="18">
      </a>

      ${g.name}
    `;

    container.appendChild(div);
  });
}

// Загрузка списка игр
fetch("games.json")
.then(r=>r.json())
.then(data=>{
  gamesData = data;
  gamesData.sort((a,b)=> new Date(b.date) - new Date(a.date));
  renderGames(gamesData);
});

// Сортировка
document.addEventListener("change", (e)=>{
  if(e.target.id !== "sortSelect") return;

  let sorted = [...gamesData];

  if(e.target.value === "date"){
    sorted.sort((a,b)=> new Date(b.date) - new Date(a.date));
  }

  if(e.target.value === "name"){
    sorted.sort((a,b)=>a.name.localeCompare(b.name));
  }

  if(e.target.value === "status"){
    sorted.sort((a,b)=>a.status.localeCompare(b.status));
  }

  renderGames(sorted);
});

// Скачивание выбранных файлов в ZIP
document.getElementById("downloadSelected").addEventListener("click", async ()=>{
  const selected = [...document.querySelectorAll(".game-checkbox:checked")];
  if(!selected.length) return alert("Выберите хотя бы один файл");

  const zip = new JSZip();

  for(let el of selected){
    const game = gamesData[el.dataset.index];
    if(game.download && game.download !== "#"){
      try {
        const response = await fetch(game.download);
        const blob = await response.blob();
        zip.file(game.download.split("/").pop(), blob);
      } catch(e){
        console.warn("Не удалось загрузить файл:", game.download);
      }
    }
  }

  zip.generateAsync({type:"blob"}).then(content=>{
    saveAs(content, "games.zip");
  });
});
</script>

<script src="script.js"></script>
</body>
</html>
