<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<title>Игры на стримах | 2nd Channel</title>

<meta name="description" content="Список игр со стримов 2nd Channel: NES, Dendy, Sega, фан-игры, ссылки на прохождения и загрузку игр.">
<meta name="keywords" content="игры на стриме, NES игры, Dendy игры, Sega, скачать игры, ретро игры, фан игры, TNU4, 2nd Channel">
</head>

<body>

<div class="bg"></div>

<div id="nav"></div>
<script>
fetch("nav.html")
.then(r => r.text())
.then(html => {
  document.getElementById("nav").innerHTML = html;

  initMenu();
  setActiveLink();
  updateMenuTitle();
});
</script>

<div class="container card center">

  <div style="margin-bottom:10px;">
    <label>Сортировка: </label>
    <select id="sortSelect">
      <option value="date" selected>По дате (новые)</option>
      <option value="name">По алфавиту</option>
      <option value="status">По статусу</option>
    </select>
  </div>

  <!-- Кнопки -->
  <div style="margin-bottom:10px; display:flex; gap:10px; flex-wrap:wrap;">
    <button id="downloadSelected">Скачать выбранное</button>
    <button id="selectAll">Выбрать все</button>
    <button id="clearAll">Снять выбор</button>
  </div>

  <div id="games"></div>

</div>

<script>
let gamesData = [];
const ytCache = {};

// ===== YouTube title =====
function getYouTubeTitle(url){
  if(!url) return Promise.resolve("");
  if(ytCache[url]) return Promise.resolve(ytCache[url]);

  if(!url.includes("youtube.com") && !url.includes("youtu.be")){
    return Promise.resolve("");
  }

  const api = "https://www.youtube.com/oembed?url=" + encodeURIComponent(url) + "&format=json";

  return fetch(api)
    .then(r => r.json())
    .then(d => {
      ytCache[url] = d.title;
      return d.title;
    })
    .catch(() => "");
}

// ===== Render =====
function renderGames(data){
  const container = document.getElementById("games");
  container.innerHTML = "";

  data.forEach(async (g, i) => {
    const title = await getYouTubeTitle(g.stream);

    const div = document.createElement("div");
    div.className = `badge ${g.status}`;

    div.innerHTML = `
      <input type="checkbox" class="game-checkbox" data-index="${i}">

      <a href="${g.stream}" target="_blank" title="${title}">
        <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png" width="18">
      </a>

      <a href="${g.download}" target="_blank" download>
        <img src="https://cdn-icons-png.flaticon.com/512/724/724933.png" width="18">
      </a>

      ${g.name}
    `;

    container.appendChild(div);
  });
}

// ===== Load =====
fetch("games.json")
.then(r=>r.json())
.then(data=>{
  gamesData = data;
  gamesData.sort((a,b)=> new Date(b.date) - new Date(a.date));
  renderGames(gamesData);
});

// ===== Sort =====
document.addEventListener("change", (e)=>{
  if(e.target.id !== "sortSelect") return;

  let sorted = [...gamesData];

  if(e.target.value === "date"){
    sorted.sort((a,b)=> new Date(b.date) - new Date(a.date));
  }

  if(e.target.value === "name"){
    sorted.sort((a,b)=>a.name.localeCompare(b.name));
  }

  if(e.target.value === "status"){
    sorted.sort((a,b)=>a.status.localeCompare(b.status));
  }

  renderGames(sorted);
});

// ===== Скачать выбранное (РАБОЧИЙ СПОСОБ) =====
document.getElementById("downloadSelected").addEventListener("click", ()=>{
  const selected = [...document.querySelectorAll(".game-checkbox:checked")];

  if(!selected.length){
    alert("Выберите хотя бы одну игру");
    return;
  }

  selected.forEach((el, index)=>{
    const game = gamesData[el.dataset.index];

    if(game.download && game.download !== "#"){
      setTimeout(()=>{
        const a = document.createElement("a");
        a.href = game.download;
        a.download = "";
        document.body.appendChild(a);
        a.click();
        a.remove();
      }, index * 500); // задержка чтобы браузер не заблокировал
    }
  });
});

// ===== Выбрать всё =====
document.getElementById("selectAll").addEventListener("click", ()=>{
  document.querySelectorAll(".game-checkbox").forEach(cb=>cb.checked = true);
});

// ===== Снять всё =====
document.getElementById("clearAll").addEventListener("click", ()=>{
  document.querySelectorAll(".game-checkbox").forEach(cb=>cb.checked = false);
});
</script>

<script src="script.js"></script>
</body>
</html>
