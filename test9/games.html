<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="components.css">
	<title>Игры на стримах | 2nd Channel</title>
	
	<meta name="description" content="2nd Channel — площадка, посвящённая ретро играм NES / Dendy, Sega и другим старым консолям. Архив игр со стримов с возможностью скачивания.">
	<meta name="robots" content="index, follow">
	<meta name="language" content="ru">

	<meta property="og:title" content="Игры со стримов — 2nd Channel">
	<meta property="og:description" content="NES / Dendy / Sega игры со стримов и архив прохождений 2nd Channel">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://2ndchannel.github.io/test9/games.html">
	<meta property="og:image" content="https://2ndchannel.github.io/system/preview.jpg">

	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="Игры со стримов | 2nd Channel">
	<meta name="twitter:description" content="Архив игр со стримов NES, Dendy и Sega с возможностью скачивания">
	<meta name="twitter:image" content="https://2ndchannel.github.io/system/preview.jpg">
</head>
<body>

<div class="bg"></div>
<div id="nav"></div>
<script src="script.js"></script>
<script>loadNavbar();</script>

<div class="container card center">
  <div style="margin-bottom:15px;">
    <label>Сортировка: </label>
    <select id="sortSelect" style="padding: 5px; border-radius: 4px;">
      <option value="date" selected>По дате</option>
      <option value="name">По алфавиту</option>
    </select>
  </div>
  <div id="games"></div>
</div>

<script>
let gamesData = [];
fetch("games.json").then(r=>r.json()).then(data=>{ gamesData = data; renderGrouped(data); });

function renderGrouped(data){
  const container = document.getElementById("games");
  container.innerHTML = "";
  const groups = {}; 
  data.forEach(game=>{ const key = game.streamTitle || "Без стрима"; if(!groups[key]) groups[key] = []; groups[key].push(game); });

  Object.keys(groups).forEach(streamName=>{
    const games = groups[streamName];
    const wrapper = document.createElement("div");
    wrapper.className = "card";
    wrapper.style.marginBottom = "20px";

    wrapper.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px;">
        <h3 style="margin:0;">${streamName}</h3>
        <button onclick="downloadStream('${streamName}')">Скачать всё</button>
      </div>
      <div id="group-${streamName.replace(/\s/g,'_')}"></div>
    `;
    container.appendChild(wrapper);
    const list = wrapper.querySelector("div[id^='group-']");
    games.forEach(game=>{
      const div = document.createElement("div");
      div.className = `badge ${game.status}`;
      div.innerHTML = `<a href="${game.stream}" target="_blank">🎥</a> <a href="${game.download}" target="_blank">⬇</a> ${game.name}`;
      list.appendChild(div);
    });
  }); // <--- Конец цикла отрисовки

  // ТЕПЕРЬ, когда все h3 и цифры уже в HTML, запускаем фикс:
  if (typeof fixNumbers === 'function') {
    fixNumbers();
  }
}

function downloadStream(streamName){
  const games = gamesData.filter(g => (g.streamTitle || "Без стрима") === streamName);
  games.forEach((g,i)=>{
    if(g.download && g.download !== "#"){
      setTimeout(()=>{
        const a = document.createElement("a"); a.href = g.download; a.download = "";
        document.body.appendChild(a); a.click(); a.remove();
      }, i * 400);
    }
  });
}
</script>
</body>
</html>
