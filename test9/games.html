<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<title>Игры на стримах | 2nd Channel</title>

<meta name="description" content="Список игр со стримов 2nd Channel: NES, Dendy, Sega, фан-игры, ссылки на прохождения и загрузку игр.">
<meta name="keywords" content="игры на стриме, NES игры, Dendy игры, Sega, скачать игры, ретро игры, фан игры, TNU4, 2nd Channel">
</head>

<body>

<div class="bg"></div>

<div id="nav"></div>
<script>
fetch("nav.html")
.then(r=>r.text())
.then(html=>{
  document.getElementById("nav").innerHTML = html;

  setTimeout(()=>{
    if(typeof setActiveLink === "function") setActiveLink();
    if(typeof initMenu === "function") initMenu();
  },0);
});
</script>

<div class="container card center">

  <div style="margin-bottom:10px;">
    <label>Сортировка: </label>
    <select id="sortSelect">
      <option value="date" selected>По дате (новые)</option>
      <option value="name">По алфавиту</option>
      <option value="status">По статусу</option>
    </select>
  </div>

  <div id="games"></div>

</div>

<script>
let gamesData = [];

function renderGames(data){
  document.getElementById("games").innerHTML =
  data.map(g=>`
    <div class="badge ${g.status}">
      <a href="${g.stream}" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png" width="18">
      </a>

      <a href="${g.download}" target="_blank" download>
        <img src="https://cdn-icons-png.flaticon.com/512/724/724933.png" width="18">
      </a>

      ${g.name}
    </div>
  `).join("");
}

fetch("games.json")
.then(r=>r.json())
.then(data=>{
  gamesData = data;

  // сортировка по дате по умолчанию (новые сверху)
  gamesData.sort((a,b)=> new Date(b.date) - new Date(a.date));

  renderGames(gamesData);
});

document.addEventListener("change", (e)=>{
  if(e.target.id !== "sortSelect") return;

  let sorted = [...gamesData];

  if(e.target.value === "date"){
    sorted.sort((a,b)=> new Date(b.date) - new Date(a.date));
  }

  if(e.target.value === "name"){
    sorted.sort((a,b)=>a.name.localeCompare(b.name));
  }

  if(e.target.value === "status"){
    sorted.sort((a,b)=>a.status.localeCompare(b.status));
  }

  renderGames(sorted);
});
</script>

<script src="script.js"></script>
</body>
</html>
