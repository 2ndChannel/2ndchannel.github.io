</head>
<body>

<audio id="error-audio" src="/a_data/system/404.ogg" preload="auto"></audio>

<div class="bg"></div>
<div id="nav"></div>

<div class="container center">
<div style="margin-top: 20px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; border: 1px solid #0ff;">
    <p style="color: #0ff; font-size: 12px; margin-bottom: 5px; font-family: sans-serif;">Тестовый плеер (удалить потом):</p>
    <audio controls src="/a_data/system/404.ogg" style="filter: invert(1); height: 30px;"></audio>
</div>
    <div class="error-card">
        <h1>404</h1>
        <h2>YOU LOSE. Continue?</h2>
        <p>Похоже, эта страница была удалена, переименована <br> или никогда не существовала.</p>
        
        <div class="error-actions">
            <a href="/">
                <button>YES • Продолжить</button>
            </a>
        </div>
        
        <p class="error-hint">
            Если вы искали игры или стримы — воспользуйтесь меню выше.
        </p>
    </div>
</div>

<script src="/a_data/system/script.js"></script>
<script>
    // Загружаем навигацию
    loadNavbar();
</script>

<script>
    const audio = document.getElementById('error-audio');

    // Функция запуска звука
    const startAudio = () => {
        if (audio && audio.paused) {
            audio.volume = 0.5;
            audio.play().catch(err => console.log("Ждем клика для звука"));
        }
    };

    // 1. Пытаемся запустить сразу (сработает редко)
    window.addEventListener('DOMContentLoaded', startAudio);

    // 2. ГАРАНТИРОВАННЫЙ запуск при любом движении пользователя
    // Как только юзер кликнет, нажмет кнопку или даже просто тронет экран (на мобилке)
    ['click', 'touchstart', 'keydown'].forEach(event => {
        document.addEventListener(event, startAudio, { once: true });
    });
</script>

</body>
</html>
