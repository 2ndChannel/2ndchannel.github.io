<body>

<div class="bg"></div>
<div id="nav"></div>

<div class="container center">
    <div class="error-card">
        
        <div class="title-wrapper">
            <h1>404</h1>
        </div>

		<p>Страница не найдена</p>

        <h2>YOU LOSE. Continue?</h2>
        
        
        <div class="error-actions">
			<button id="rnd-sound" class="btn-play-mini" title="Случайный звук">▶</button>
            <a href="/">
                <button class="btn-continue">
					<span class="word-yes">YES</span>
					<span class="divider">•</span>
					<span class="word-cont">Продолжить</span>
				</button>
            </a>
        </div>
        
        <p class="error-hint">
            Воспользуйтесь меню выше, чтобы вернуться
        </p>
    </div>
</div>

<script src="/a_data/system/script.js"></script>
<script>
    // 1. Подгружаем меню сайта
    loadNavbar();

    // 2. Логика случайных звуков по кнопке
    const soundBtn = document.getElementById('rnd-sound');
    const soundPath = '/a_data/system/se404/';
    const maxFile = 43; // Ищем файлы от 1.ogg до 43.ogg

    function playRandomWithCheck() {
        const rnd = Math.floor(Math.random() * maxFile) + 1;
        const audio = new Audio(soundPath + rnd + '.ogg');
        audio.volume = 0.5;

        // Пытаемся запустить файл
        const playPromise = audio.play();

        if (playPromise !== undefined) {
            playPromise.then(() => {
                // Если файл найден — включаем анимацию
                soundBtn.classList.add('playing');
                soundBtn.innerText = "🔊";
                
                audio.onended = () => {
                    // Когда звук закончился — возвращаем иконку ▶
                    soundBtn.classList.remove('playing');
                    soundBtn.innerText = "▶";
                };
            }).catch(error => {
                // Если файла не существует (404 ошибка), ищем следующий рандомный
                console.log(`Файл ${rnd}.ogg отсутствует, пробую другой...`);
                playRandomWithCheck(); 
            });
        }
    }

    if (soundBtn) {
        soundBtn.addEventListener('click', () => {
            // Если звук уже играет — повторно не нажимается
            if (soundBtn.classList.contains('playing')) return;
            playRandomWithCheck();
        });
    }
</script>
</body>
